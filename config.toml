baseURL = "https://programmador.com"
theme = "hugo-trainsh"
title = "ieg archive"
author = "Ivan Eduardo Guerra"
copyright = "All rights Reserved, Ivan Eduardo Guerra."
enableRobotsTXT = true
googleAnalytics = "G-XEENY573SL"
languageCode = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true

# URL normalization
disablePathToLower = false # ensure all paths are lowercased
removePathAccents = true   # normalize diacritics in paths
preserveTaxonomyNames = false

[outputs]
home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts"
    weight = 1
  [[menu.main]]
    name = "Notes"
    url = "/categories/notes"
    weight = 5
  [[menu.main]]
    name = "Search"
    url = "/blog"
    weight = 10

[params]
  mainSections = ["posts"]

  [params.upvote]
    enabled = false
    endpoint = "/api/upvote"
    infoEndpoint = "/api/upvote-info"

  [params.social]
    github = "https://github.com/ivan-guerra"
    linkedin = "https://www.linkedin.com/in/ivan-guerra"
    email = "ivan.eduardo.guerra@gmail.com"

  [params.home]
    [params.home.recent]
      limit = 5

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.parser.attribute]
    block = true

  [markup.highlight]
    # Keep settings aligned with the theme's `render-codeblock.html` hook.
    lineNos = false
    lineNumbersInTable = false
    anchorLineNos = false
    codeFences = true
    lineNoStart = 1
    noClasses = true
